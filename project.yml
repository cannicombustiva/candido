name: JobTracker

options:
  bundleIdPrefix: com.candido
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  JobTrackerCore:
    path: .

targets:
  JobTracker:
    type: application
    platform: macOS
    sources:
      - path: App
    dependencies:
      - package: JobTrackerCore
        product: JobTrackerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.candido.JobTracker
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        # The product is called Candido; the target, the product name and the
        # bundle identifier stay JobTracker. Renaming the identifier would key
        # the app to a new, empty sandbox container.
        INFOPLIST_KEY_CFBundleDisplayName: Candido
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: App/JobTracker.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        SWIFT_VERSION: "6.0"
      configs:
        # A sandboxed app's container is keyed by its bundle identifier, so a
        # Debug build sharing the release identifier would open — and migrate —
        # the real store. Debug gets its own identifier, and therefore its own
        # container: agent runs cannot touch the owner's tracked applications.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.candido.JobTracker.dev
          INFOPLIST_KEY_CFBundleDisplayName: Candido (Dev)
